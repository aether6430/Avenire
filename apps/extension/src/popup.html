<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Avenire Web Clipper</title>
    <link rel="stylesheet" href="./icons.css" />
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main id="popup-container">
      <section id="auth-panel" class="auth-panel">
        <div class="auth-panel__content">
          <div class="brand-lockup">
            <span class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 198 154" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M119 116.5V81.5C119 79.1 117 78.1666 116 77.9999H83C79.8 77.9999 78.3807 80.3333 78.071 81.5V116.5C78.071 117.667 76.752 120.223 72.1038 122.5C67 125 34.9745 143.667 19.3934 153C18.5647 153.333 16.6087 153.5 15.4153 151.5C14.2219 149.5 10.6084 143.333 8.95082 140.5C8.45355 139.333 8.25465 136.6 11.4372 135C14.6197 133.4 36.3005 121 46.7432 115C47.5719 114.167 49.0306 112.1 48.235 110.5C47.4393 108.9 45.9144 108.167 45.2514 108H1.98907C1.32605 108 0 107.6 0 106V91.3892C0 90.5928 0.397815 89 1.98907 89H44.3705C45.6587 89 48.235 88.3 48.235 85.5C48.235 82.7 45.2514 81 43.7596 80.5L9.44809 60.5C8.95082 60.1667 8.25465 59 9.44809 57C10.6415 55 14.918 47.5 16.9071 44C17.2386 43.6667 18.3989 43.3 20.388 44.5C22.377 45.7 59.3406 67.3333 77.5738 77.9999L43.7596 19.4999C43.2623 18.8333 42.8645 17.1999 45.2514 15.9999C47.6383 14.7999 54.5337 10.4999 57.6831 8.49994C58.1803 8.16661 59.5727 8.19994 61.1639 10.9999C62.7552 13.7999 75.7505 36.1666 82.0492 47C84.204 47.6667 88.5137 47.9 88.5137 43.5V1.38477C88.5137 0.923177 89.0109 0 91 0H106C108 0 108.5 0.923177 108.5 1.38477V43.5C108.5 47.9 112.833 47.6667 115 47C121.333 36.1666 134.4 13.7999 136 10.9999C137.6 8.19994 139 8.16661 139.5 8.49994C142.667 10.4999 149.6 14.7999 152 15.9999C154.4 17.1999 154 18.8333 153.5 19.4999L119.5 77.9999C137.833 67.3333 175 45.7 177 44.5C179 43.3 180.167 43.6667 180.5 44C182.5 47.5 186.8 55 188 57C189.2 59 188.5 60.1667 188 60.5L153.5 80.5C152 81 149 82.7 149 85.5C149 88.3 151.59 89 152.886 89H195.5C197.1 89 197.5 90.5928 197.5 91.3892V106C197.5 107.6 196.167 108 195.5 108H152C151.333 108.167 149.8 108.9 149 110.5C148.2 112.1 149.667 114.167 150.5 115C161 121 182.8 133.4 186 135C189.2 136.6 189 139.333 188.5 140.5C186.833 143.333 183.2 149.5 182 151.5C180.8 153.5 178.833 153.333 178 153C162.333 143.667 129.5 125 125 122.5C120.454 119.975 119 117.667 119 116.5Z" fill="currentColor"/>
              </svg>
            </span>
            <div class="brand-copy">
              <h1>Avenire Web Clipper</h1>
            </div>
          </div>
          <p id="auth-status" class="auth-copy">
            Sign in to Avenire before you clip anything from this page.
          </p>
          <div class="auth-actions">
            <button id="sign-in" class="button button-primary" type="button">Open sign in</button>
            <button id="open-register" class="button button-ghost" type="button">Create account</button>
          </div>
        </div>
      </section>

      <div id="signed-in-shell" class="signed-in-shell" hidden>
        <div id="popup-header">
          <div id="destination-container">
            <select id="destination-select"></select>
          </div>
          <div class="popup-actions">
            <button id="refresh-context" class="icon-button" type="button" title="Refresh clip context" aria-label="Refresh clip context">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 256 256" fill="currentColor"><path d="M228 128a100 100 0 0 1-171.37 70.71 12 12 0 1 1 17-16.94A76 76 0 1 0 76 74.06V96a12 12 0 0 1-24 0V40a12 12 0 0 1 12-12h56a12 12 0 0 1 0 24H88.8A99.77 99.77 0 0 1 228 128Z"/></svg>
              </span>
            </button>
            <button id="add-highlight" class="icon-button" type="button" title="Save selection as highlight" aria-label="Save selection as highlight">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 256 256" fill="currentColor"><path d="M212.49 83.51l-40-40a12 12 0 0 0-17 0L36 163l-11.51 46A12 12 0 0 0 39 223.51l46-11.51 119.52-119.51a12 12 0 0 0-.03-16.98ZM80.19 188.9l-26.82 6.7 6.7-26.82L145 83.88 172.12 111ZM189.09 94.06 162 67l10.49-10.48L199.58 83.6ZM232 212a12 12 0 0 1-12 12h-92a12 12 0 0 1 0-24h92a12 12 0 0 1 12 12Z"/></svg>
              </span>
            </button>
            <button id="clear-highlights" class="icon-button" type="button" title="Clear highlights" aria-label="Clear highlights">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 256 256" fill="currentColor"><path d="M216.49 199.52a12 12 0 0 1-17 17L128 145l-71.51 71.52a12 12 0 0 1-17-17L111 128 39.52 56.49a12 12 0 0 1 17-17L128 111l71.51-71.52a12 12 0 0 1 17 17L145 128Z"/></svg>
              </span>
            </button>
            <button id="open-settings" class="icon-button" type="button" title="Open settings" aria-label="Open settings">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 256 256" fill="currentColor"><path d="M228.61 147.19a16 16 0 0 0 0-38.38l-10.92-3.83a91.05 91.05 0 0 0-8.76-21.11l5-10.46a16 16 0 0 0-22.62-20.27l-10 5.58a91.73 91.73 0 0 0-21.17-8.77l-3.82-10.91a16 16 0 0 0-38.39 0L114.1 50a91.73 91.73 0 0 0-21.17 8.77l-10-5.58a16 16 0 0 0-22.62 20.27l5 10.46a91.05 91.05 0 0 0-8.76 21.11l-10.92 3.83a16 16 0 0 0 0 38.38l10.92 3.83a91.05 91.05 0 0 0 8.76 21.11l-5 10.46a16 16 0 0 0 22.62 20.27l10-5.58a91.73 91.73 0 0 0 21.17 8.77l3.83 10.91a16 16 0 0 0 38.38 0l3.82-10.91a91.73 91.73 0 0 0 21.17-8.77l10 5.58a16 16 0 0 0 22.62-20.27l-5-10.46a91.05 91.05 0 0 0 8.76-21.11ZM128 164a36 36 0 1 1 36-36 36 36 0 0 1-36 36Z"/></svg>
              </span>
            </button>
            <button id="sign-out" class="icon-button" type="button" title="Sign out" aria-label="Sign out">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 256 256" fill="currentColor"><path d="M216.49 111.51l-40-40a12 12 0 0 0-17 17L179 108H104a12 12 0 0 0 0 24h75l-19.52 19.51a12 12 0 0 0 17 17l40-40a12 12 0 0 0 .01-16.99ZM96 204H56V52h40a12 12 0 0 0 0-24H52a20 20 0 0 0-20 20v160a20 20 0 0 0 20 20h44a12 12 0 0 0 0-24Z"/></svg>
              </span>
            </button>
          </div>
        </div>

        <p id="result" class="error-message" hidden></p>

        <div class="clipper">
          <textarea id="note-title-field" rows="1" placeholder="Clip title"></textarea>

          <div class="metadata-properties-header">
            <span>Properties</span>
          </div>
          <div id="metadata-properties" class="metadata-properties"></div>

          <div id="note-content-container">
            <textarea id="note-content-field" rows="8" placeholder="Web content will appear here"></textarea>
          </div>

          <div class="clipper-footer">
            <div class="action-buttons">
              <button id="clip-now" class="button button-primary wide-button" type="button">Clip into Avenire</button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="./popup.js"></script>
  </body>
</html>
